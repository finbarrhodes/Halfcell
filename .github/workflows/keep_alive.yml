name: Keep Streamlit App Alive

on:
  schedule:
    - cron: '0 */5 * * *'  # Every 5 hours — two-failure buffer before 12h sleep threshold
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest

    steps:
      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Ping Streamlit app
        run: |
          python3 - << 'EOF'
          import asyncio
          import sys
          from playwright.async_api import async_playwright, TimeoutError as PWTimeout

          URL     = "https://halfcell.streamlit.app"
          TIMEOUT = 150_000  # ms — 2.5 min, accounts for cold wake from sleep

          async def main():
              async with async_playwright() as pw:
                  browser = await pw.chromium.launch()
                  page    = await browser.new_page()

                  print(f"Navigating to {URL} ...")
                  await page.goto(URL, wait_until="domcontentloaded", timeout=TIMEOUT)
                  print(f"Page title: {await page.title()}")

                  # Dump visible text to diagnose what state the page is in
                  body_text = await page.inner_text("body")
                  print(f"Body preview: {body_text[:300]}")

                  # If the app is sleeping, Streamlit shows a wake prompt — click it.
                  # The button text may vary; check both known variants.
                  for wake_text in ["Yes, get this app back up!", "Wake app"]:
                      try:
                          btn = await page.wait_for_selector(
                              f"text={wake_text}",
                              timeout=5_000
                          )
                          print(f"App was sleeping — clicking '{wake_text}' ...")
                          await btn.click()
                          break
                      except PWTimeout:
                          pass

                  # Wait for the Streamlit root element — confirms the app rendered.
                  try:
                      await page.wait_for_selector(
                          '[data-testid="stApp"]',
                          timeout=TIMEOUT
                      )
                      print("SUCCESS: Streamlit app is live.")
                  except PWTimeout:
                      print("ERROR: stApp did not appear within timeout.", file=sys.stderr)
                      await browser.close()
                      sys.exit(1)

                  await browser.close()

          asyncio.run(main())
          EOF
