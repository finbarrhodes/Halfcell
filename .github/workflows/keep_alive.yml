name: Keep Streamlit App Alive

on:
  schedule:
    - cron: '0 */5 * * *'  # Every 5 hours — two-failure buffer before 12h sleep threshold
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest

    steps:
      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Ping Streamlit app
        run: |
          python3 - << 'EOF'
          import asyncio
          import sys
          from playwright.async_api import async_playwright, TimeoutError as PWTimeout

          URL     = "https://halfcell.streamlit.app"
          TIMEOUT = 90_000  # ms — generous for a cold wake

          async def main():
              async with async_playwright() as pw:
                  browser = await pw.chromium.launch()
                  page    = await browser.new_page()

                  print(f"Navigating to {URL} ...")
                  await page.goto(URL, wait_until="domcontentloaded", timeout=TIMEOUT)

                  # If the app is already sleeping, Streamlit shows a wake prompt.
                  # Click it so the visit actually triggers a wake, not just a bounce.
                  try:
                      btn = await page.wait_for_selector(
                          "text=Yes, get this app back up!",
                          timeout=6_000
                      )
                      print("App was sleeping — clicking wake button ...")
                      await btn.click()
                  except PWTimeout:
                      pass  # App already live, no wake prompt present

                  # Wait for the Streamlit root element — confirms the app rendered,
                  # not just that the server responded.
                  try:
                      await page.wait_for_selector(
                          '[data-testid="stApp"]',
                          timeout=TIMEOUT
                      )
                      print("SUCCESS: Streamlit app is live.")
                  except PWTimeout:
                      print("ERROR: stApp did not appear within timeout.", file=sys.stderr)
                      await browser.close()
                      sys.exit(1)

                  await browser.close()

          asyncio.run(main())
          EOF
